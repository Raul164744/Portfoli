<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 4</title>

    <style>
        /* Carga de fuentes */
        @font-face {
            font-family: "TituloFont";
            src: url("fonts/titulo.ttf");
        }

        @font-face {
            font-family: "TextoFont";
            src: url("fonts/texto.ttf");
        }

        body {
            background-color: #f6f0e8;
            padding: 40px;
        }

        .contenedor {
            background-color: #ffffff;
            padding: 30px;
            max-width: 800px;
        }

        /* Clases */
        .titulo {
            font-family: "TituloFont";
            font-size: 32px;
        }

        .texto {
            font-family: "TextoFont";
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="contenedor">
        <h1 class="titulo">Mi nuevo sitio web</h1>

        <p class="texto">
            Este es un texto de ejemplo. Podemos escribir cualquier
            contenido mientras se apliquen correctamente las fuentes
            mediante clases CSS.
        </p>
    </div>
</body>
</html>
