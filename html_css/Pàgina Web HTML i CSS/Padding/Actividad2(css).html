<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .tabla {
            width: 300px;
            margin: 40px auto;
            background-color: white;
            border: 1px solid #ddd;
            padding: 20px;
            text-align: center;
        }

        .etiqueta {
            background-color: #ffd966;
            font-size: 12px;
            padding: 5px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        h2 {
            margin-bottom: 10px;
        }

        .precio {
            font-size: 28px;
            font-weight: bold;
            margin: 15px 0;
        }

        button {
            background-color: #007c89;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
            text-align: left;
            font-size: 14px;
        }

        ul li {
            margin-bottom: 8px;
        }

        a {
            display: block;
            margin-top: 15px;
            font-size: 13px;
            color: #007c89;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="tabla">
        <div class="etiqueta">Recomendado por Mailchimp</div>
        <h2>Standard</h2>
        <p>Herramientas de optimización y automatización</p>

        <div class="precio">14€</div>
        <p>/mes basado en 500 contactos</p>

        <button>Compra ahora</button>

        <ul>
            <li>✓ Automatizaciones</li>
            <li>✓ Pruebas A/B</li>
            <li>✓ Segmentación avanzada</li>
            <li>✓ Soporte por email</li>
        </ul>

        <a href="#">Acerca de Standard</a>
    </div>

</body>
</html>
