<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Accessibilitat - Activitat 1</title>
</head>
<body>
    <h1>Activitat 1: Etiquetes i roles</h1>
    <p>Aquesta pàgina demostra pràctiques bàsiques d'accessibilitat:</p>
    <ul>
        <li><strong>Imatge amb alt:</strong> <img src="placeholder.png" alt="Imatge descriptiva" /></li>
        <li><strong>Enllaç clar:</strong> <a href="https://example.com">Visita Example</a></li>
        <li><strong>Formulari amb etiquetes:</strong>
            <form>
                <label for="nom">Nom:</label>
                <input id="nom" name="nom" type="text" />
                <button type="submit">Enviar</button>
            </form>
        </li>
    </ul>
    <p>Utilitza el lector de pantalla per llegir l'Alt i les etiquetes.</p>
</body>
</html>
