<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Actividad 3</title>
<style>
body {
  background: #f5f1e8;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Marco */
.marco {
  width: 320px;
  height: 320px;
  border: 12px solid #ff4a3d;
  border-radius: 30px;
  background: white;
  position: relative;
}

/* Cuerpo */
.cuerpo {
  width: 200px;
  height: 140px;
  background: #ff4a3d;
  border: 6px solid black;
  border-radius: 60px;
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
}

/* Ojos */
.ojo {
  width: 60px;
  height: 60px;
  background: white;
  border: 6px solid black;
  border-radius: 50%;
  position: absolute;
  top: -35px;
}

.ojo::before {
  content: "";
  width: 30px;
  height: 30px;
  background: #33b6c6;
  border-radius: 50%;
  position: absolute;
  top: 10px;
  left: 10px;
}

.ojo::after {
  content: "";
  width: 14px;
  height: 14px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 18px;
  left: 18px;
}

.ojo.izq { left: -20px; }
.ojo.centro { left: 70px; }
.ojo.der { right: -20px; }

/* Boca */
.boca {
  width: 80px;
  height: 40px;
  border-bottom: 6px solid black;
  border-radius: 0 0 40px 40px;
  position: absolute;
  bottom: 55px;
  left: 50%;
  transform: translateX(-50%);
}

/* Lengua */
.lengua {
  width: 30px;
  height: 45px;
  background: #d81b60;
  border: 6px solid black;
  border-radius: 0 0 20px 20px;
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>
<body>

<div class="marco">
  <div class="cuerpo">
    <div class="ojo izq"></div>
    <div class="ojo centro"></div>
    <div class="ojo der"></div>
    <div class="boca"></div>
    <div class="lengua"></div>
  </div>
</div>

</body>
</html>
