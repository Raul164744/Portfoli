<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 3</title>
    <style>
        nav {
            width: 200px;
            border: 3px solid black;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li a {
            display: block;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            font-size: 28px;
            color: white;
            background-color: #6e9aa5;
            border-bottom: 3px solid black;
        }

        nav ul li a:hover {
            background-color: #4f7f8a;
            color: #eaeaea;
        }
    </style>
</head>
<body>

<nav>
    <ul>
        <li><a href="#">Productos</a></li>
        <li><a href="#">Carrito</a></li>
        <li><a href="#">Perfil</a></li>
    </ul>
</nav>

</body>
</html>
