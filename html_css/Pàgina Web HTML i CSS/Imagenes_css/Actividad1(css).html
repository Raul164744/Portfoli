<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 1 - Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .chat {
            max-width: 600px;
            margin: auto;
        }

        article {
            display: flex;
            background-color: white;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            margin-right: 10px;
        }

        .contenido {
            flex: 1;
        }

        .nombre {
            font-weight: bold;
            color: #333;
        }

        .fecha {
            font-size: 12px;
            color: gray;
        }

        .mensaje {
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="chat">

    <article>
        <img src="https://via.placeholder.com/50" class="avatar" alt="Avatar">
        <div class="contenido">
            <div class="nombre">Ana</div>
            <div class="fecha">12/01/2026</div>
            <div class="mensaje">Hola, ¿has terminado la actividad?</div>
        </div>
    </article>

    <article>
        <img src="https://via.placeholder.com/50" class="avatar" alt="Avatar">
        <div class="contenido">
            <div class="nombre">Carlos</div>
            <div class="fecha">12/01/2026</div>
            <div class="mensaje">Sí, ya la tengo lista.</div>
        </div>
    </article>

</div>

</body>
</html>
