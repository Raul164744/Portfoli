<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividad 2 - Tarjeta de contacto</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        main {
            height: 100vh;
            position: relative;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        section {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background-color: rgba(0,0,0,0.5);
            color: white;
            display: flex;
            align-items: center;
        }

        nav {
            margin-left: 30px;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin-bottom: 10px;
        }

        a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>
<body>

<main>
    <img src="https://via.placeholder.com/1200x800" alt="Fondo">

    <section>
        <nav>
            <ul>
                <li><a href="#">Currículum Vitae</a></li>
                <li><a href="#">Redes Sociales</a></li>
                <li><a href="#">Email</a></li>
                <li><a href="#">Otros proyectos</a></li>
            </ul>
        </nav>
    </section>
</main>

</body>
</html>
